<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dockploy - Container Deployment Console</title>
    <!-- Modern Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #0B0F19;
            --bg-surface: rgba(17, 24, 39, 0.7);
            --bg-card: rgba(31, 41, 55, 0.4);
            --primary: #6366F1;
            --primary-glow: rgba(99, 102, 241, 0.15);
            --success: #10B981;
            --danger: #EF4444;
            --text-main: #F3F4F6;
            --text-muted: #9CA3AF;
            --border: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(99, 102, 241, 0.4);
            --font-sans: 'Plus Jakarta Sans', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --radius-lg: 16px;
            --radius-md: 12px;
            --radius-sm: 8px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: var(--font-sans);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            overflow-x: hidden;
            position: relative;
        }

        /* Abstract glowing background blobs */
        body::before {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.12) 0%, transparent 70%);
            top: -100px;
            right: -100px;
            z-index: -1;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(16, 185, 129, 0.08) 0%, transparent 70%);
            bottom: 10%,;
            left: -100px;
            z-index: -1;
            pointer-events: none;
        }

        header {
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(12px);
            background: rgba(11, 15, 25, 0.8);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.25rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FFF 0%, #6366F1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo svg {
            stroke: var(--primary);
        }

        .status-badge {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: var(--success);
            padding: 0.35rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.85rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--success);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--success);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        main {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding: 2.5rem 2rem;
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 2.5rem;
            flex-grow: 1;
        }

        @media (max-width: 900px) {
            main {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 2rem;
            backdrop-filter: blur(16px);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            height: fit-content;
        }

        h2 {
            font-size: 1.25rem;
            font-weight: 600;
            color: #FFF;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-muted);
        }

        input, textarea, select {
            background: rgba(17, 24, 39, 0.5);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 0.75rem 1rem;
            color: #FFF;
            font-family: var(--font-sans);
            font-size: 0.95rem;
            transition: var(--transition);
            width: 100%;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }

        select option {
            background: #111827;
            color: #FFF;
        }

        .btn {
            background: var(--primary);
            color: #FFF;
            border: none;
            border-radius: var(--radius-sm);
            padding: 0.85rem 1.5rem;
            font-family: var(--font-sans);
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            width: 100%;
        }

        .btn:hover {
            background: #4F46E5;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            background: var(--border);
            color: var(--text-muted);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #FFF;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .container-section {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .refresh-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            border-radius: var(--radius-sm);
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
        }

        .refresh-btn:hover {
            color: #FFF;
            border-color: var(--text-muted);
            background: rgba(255, 255, 255, 0.05);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 1.25rem;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--success));
            opacity: 0;
            transition: var(--transition);
        }

        .card:hover {
            border-color: var(--border-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px rgba(0, 0, 0, 0.4);
        }

        .card:hover::before {
            opacity: 1;
        }

        .card-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #FFF;
            word-break: break-all;
            padding-right: 2rem;
        }

        .card-subtitle {
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--text-muted);
            background: rgba(255, 255, 255, 0.05);
            padding: 0.25rem 0.5rem;
            border-radius: var(--radius-sm);
            width: fit-content;
        }

        .card-domain {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            color: var(--primary);
            text-decoration: none;
            margin-top: 0.25rem;
            transition: var(--transition);
            word-break: break-all;
        }

        .card-domain:hover {
            color: #818CF8;
            text-decoration: underline;
        }

        .card-actions {
            display: flex;
            gap: 0.75rem;
            margin-top: auto;
            padding-top: 0.75rem;
            border-top: 1px solid var(--border);
        }

        .card-btn {
            flex: 1;
            padding: 0.5rem;
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.35rem;
        }

        .card-btn-open {
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.2);
            color: #A5B4FC;
            text-decoration: none;
        }

        .card-btn-open:hover {
            background: var(--primary);
            color: #FFF;
            border-color: var(--primary);
        }

        .card-btn-delete {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #FCA5A5;
        }

        .card-btn-delete:hover {
            background: var(--danger);
            color: #FFF;
            border-color: var(--danger);
        }

        .empty-state {
            grid-column: 1 / -1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4rem 2rem;
            border: 2px dashed var(--border);
            border-radius: var(--radius-lg);
            text-align: center;
            color: var(--text-muted);
        }

        .empty-state svg {
            margin-bottom: 1rem;
            stroke: var(--text-muted);
        }

        .toast-container {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            z-index: 100;
        }

        .toast {
            background: rgba(17, 24, 39, 0.9);
            border: 1px solid var(--border);
            border-left: 4px solid var(--primary);
            border-radius: var(--radius-sm);
            padding: 1rem 1.5rem;
            color: #FFF;
            font-size: 0.9rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            animation: slideIn 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(8px);
        }

        .toast-success {
            border-left-color: var(--success);
        }

        .toast-error {
            border-left-color: var(--danger);
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-container">
            <div class="logo">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                    <line x1="12" y1="11" x2="12" y2="17"></line>
                    <line x1="9" y1="14" x2="15" y2="14"></line>
                </svg>
                Dockploy
            </div>
            <div class="status-badge">
                <div class="status-dot"></div>
                <span>Engine Connected</span>
            </div>
        </div>
    </header>

    <main>
        <!-- Deploy Controls Panel -->
        <section class="panel">
            <h2>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                Deploy Container
            </h2>
            <form id="deployForm">
                <div class="form-group" style="margin-bottom: 1.25rem;">
                    <label for="image">Docker Image</label>
                    <input type="text" id="image" placeholder="e.g. nginx, redis, node" required>
                </div>
                <div class="form-group" style="margin-bottom: 1.25rem;">
                    <label for="tag">Tag</label>
                    <input type="text" id="tag" placeholder="e.g. alpine, latest, 17" value="alpine" required>
                </div>
                <div class="form-group" style="margin-bottom: 1.25rem;">
                    <label for="port">Container Port (Internal)</label>
                    <input type="number" id="port" placeholder="e.g. 80, 3000, 8080" value="80" required min="1" max="65535">
                </div>
                <div class="form-group" style="margin-bottom: 1.25rem;">
                    <label for="hostPort">Host Port (External) (Optional)</label>
                    <input type="number" id="hostPort" placeholder="e.g. 8080, 6379 (leave blank for none)" min="1" max="65535">
                </div>
                <div class="form-group" style="margin-bottom: 1.25rem;">
                    <label for="env">Environment Variables (Optional)</label>
                    <textarea id="env" placeholder="KEY=VALUE&#10;e.g. POSTGRES_PASSWORD=postgres" rows="3"></textarea>
                </div>
                <div class="form-group" style="margin-bottom: 1.25rem;">
                    <label for="cmd">Command (Optional)</label>
                    <input type="text" id="cmd" placeholder="e.g. python -m http.server 80 or [&quot;node&quot;, &quot;app.js&quot;]">
                </div>
                <div class="form-group" style="margin-bottom: 1.25rem;">
                    <label for="volumes">Volumes (Optional)</label>
                    <textarea id="volumes" placeholder="host_path:container_path (one per line, e.g. /home/user/data:/data)" rows="3"></textarea>
                </div>
                <div class="form-group" style="margin-bottom: 1.25rem;">
                    <label for="restartPolicy">Restart Policy</label>
                    <select id="restartPolicy">
                        <option value="no">no</option>
                        <option value="always">always</option>
                        <option value="unless-stopped">unless-stopped</option>
                        <option value="on-failure">on-failure</option>
                    </select>
                </div>
                <div class="form-group" style="margin-bottom: 1.5rem; flex-direction: row; align-items: center; gap: 0.5rem;">
                    <input type="checkbox" id="autoRemove" checked style="width: auto; cursor: pointer; margin: 0;">
                    <label for="autoRemove" style="margin: 0; cursor: pointer;">Auto Remove Container on Stop</label>
                </div>
                <button type="submit" id="deployBtn" class="btn">
                    Deploy Container
                </button>
            </form>
        </section>

        <!-- Containers Grid Section -->
        <section class="container-section">
            <div class="section-header">
                <h2>Active Containers</h2>
                <button id="refreshBtn" class="refresh-btn" title="Refresh list">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"></path>
                    </svg>
                </button>
            </div>

            <div id="containersGrid" class="grid">
                <!-- Dynamic Content Loaded here -->
            </div>
        </section>
    </main>

    <div id="toastContainer" class="toast-container"></div>

    <script>
        const deployForm = document.getElementById('deployForm');
        const deployBtn = document.getElementById('deployBtn');
        const refreshBtn = document.getElementById('refreshBtn');
        const containersGrid = document.getElementById('containersGrid');
        const toastContainer = document.getElementById('toastContainer');

        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerText = message;
            toastContainer.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(10px)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        async function fetchContainers() {
            try {
                const res = await fetch('/containers');
                const result = await res.json();
                if (result.status === 'Success') {
                    renderContainers(result.Data);
                } else {
                    showToast('Failed to fetch containers', 'error');
                }
            } catch (err) {
                console.error(err);
                showToast('Error connecting to Server API', 'error');
            }
        }

        function renderContainers(containers) {
            // Filter out the dockploy-api itself to focus on deployed user containers
            const userContainers = containers.filter(c => c.containerName !== 'dockploy-api-1');

            if (userContainers.length === 0) {
                containersGrid.innerHTML = `
                    <div class="empty-state">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="2" y="2" width="20" height="8" rx="2" ry="2"></rect>
                            <rect x="2" y="14" width="20" height="8" rx="2" ry="2"></rect>
                            <line x1="6" y1="6" x2="6.01" y2="6"></line>
                            <line x1="6" y1="18" x2="6.01" y2="18"></line>
                        </svg>
                        <p>No active user containers found.</p>
                        <p style="font-size: 0.85rem; margin-top: 0.25rem;">Deploy one on the left panel to get started!</p>
                    </div>
                `;
                return;
            }

            containersGrid.innerHTML = userContainers.map(container => `
                <div class="card" data-name="${container.containerName}">
                    <div class="card-header">
                        <div>
                            <div class="card-title">${container.containerName}</div>
                            ${container.domain ? `
                            <a href="${container.domain}" target="_blank" class="card-domain">
                                ${container.domain}
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
                                    <polyline points="15 3 21 3 21 9"></polyline>
                                    <line x1="10" y1="14" x2="21" y2="3"></line>
                                </svg>
                            </a>
                            ` : `<span style="font-size: 0.8rem; color: var(--text-muted);">External Container</span>`}
                            
                            ${container.hostPort ? `
                            <div style="font-size: 0.8rem; color: var(--text-muted); margin-top: 0.25rem; font-family: monospace;">
                                Port Map: host:${container.hostPort} &rarr; container:${container.port}
                            </div>
                            ` : `
                            <div style="font-size: 0.8rem; color: var(--text-muted); margin-top: 0.25rem; font-family: monospace;">
                                Port: container:${container.port || '80'}
                            </div>
                            `}
                        </div>
                    </div>
                    <div class="card-actions">
                        ${container.domain ? `
                        <a class="card-btn card-btn-open" href="${container.domain}" target="_blank">
                            Open App
                        </a>
                        ` : ''}
                        <button class="card-btn card-btn-delete" onclick="deleteContainer('${container.containerName}')">
                            Delete
                        </button>
                    </div>
                </div>
            `).join('');
        }

        deployForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const image = document.getElementById('image').value.trim();
            const tag = document.getElementById('tag').value.trim();
            const port = document.getElementById('port').value.trim();
            const hostPort = document.getElementById('hostPort').value.trim();
            const env = document.getElementById('env').value.trim();
            const cmd = document.getElementById('cmd').value.trim();
            const volumes = document.getElementById('volumes').value.trim();
            const restartPolicy = document.getElementById('restartPolicy').value;
            const autoRemove = document.getElementById('autoRemove').checked;

            deployBtn.disabled = true;
            deployBtn.innerHTML = `<span class="spinner"></span> Deploying...`;

            try {
                const res = await fetch('/container', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image, tag, port, hostPort, env, cmd, volumes, restartPolicy, autoRemove })
                });
                const result = await res.json();
                if (result.status === 'Success') {
                    showToast(`Successfully deployed ${image}:${tag} on port ${port}!`, 'success');
                    fetchContainers();
                    deployForm.reset();
                    document.getElementById('tag').value = 'alpine'; // Reset default tag
                    document.getElementById('port').value = '80'; // Reset default port
                    document.getElementById('restartPolicy').value = 'no'; // Reset restart policy
                    document.getElementById('autoRemove').checked = true; // Reset auto remove
                } else {
                    showToast(result.message || 'Failed to deploy container', 'error');
                }
            } catch (err) {
                console.error(err);
                showToast('Network error deploying container', 'error');
            } finally {
                deployBtn.disabled = false;
                deployBtn.innerHTML = 'Deploy Container';
            }
        });

        async function deleteContainer(name) {
            if (!confirm(`Are you sure you want to delete container "${name}"?`)) return;

            const card = document.querySelector(`.card[data-name="${name}"]`);
            if (card) {
                card.style.opacity = '0.5';
                const deleteBtn = card.querySelector('.card-btn-delete');
                deleteBtn.disabled = true;
                deleteBtn.innerText = 'Deleting...';
            }

            try {
                const res = await fetch(`/container/${name}`, {
                    method: 'DELETE'
                });
                const result = await res.json();
                if (result.status === 'Success') {
                    showToast(`Container "${name}" deleted successfully.`, 'success');
                    fetchContainers();
                } else {
                    showToast(result.message || 'Failed to delete container', 'error');
                    fetchContainers();
                }
            } catch (err) {
                console.error(err);
                showToast('Network error deleting container', 'error');
                fetchContainers();
            }
        }

        refreshBtn.addEventListener('click', fetchContainers);

        // Initial Load
        fetchContainers();
    </script>
</body>
</html>
